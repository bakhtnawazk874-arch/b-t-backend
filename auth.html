<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B-T AI — log in or sign up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#171717;
    --surface:#212121;
    --ink:#ECECEC;
    --ink-soft:#9B9B93;
    --forest:#D4A72C;
    --forest-light:#E0B94A;
    --gold:#D4A72C;
    --line:#3A3A3A;
    --danger:#F16A5C;
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    width:100%;
    max-width:380px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:32px 28px;
    animation:cardIn .5s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes cardIn{
    from{opacity:0;transform:translateY(16px) scale(.98);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .mark{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    color:var(--forest);
    text-align:center;
    margin-bottom:4px;
  }
  .tagline{text-align:center;font-size:13px;color:var(--ink-soft);margin-bottom:24px;}
  .tabs{display:flex;border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:22px;}
  .tab{flex:1;text-align:center;padding:8px;font-size:13.5px;font-weight:500;color:var(--ink-soft);border-radius:8px;cursor:pointer;transition:background .18s ease, color .18s ease;}
  .tab.active{background:var(--gold);color:#2A2109;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;margin-top:14px;}
  input{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:14.5px;font-family:inherit;outline:none;color:var(--ink);background:var(--paper);
    transition:border-color .18s ease;
  }
  input:focus{border-color:var(--gold);}
  .field-hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}
  .submit-btn{
    width:100%;margin-top:22px;padding:11px;background:var(--gold);color:#2A2109;
    border:none;border-radius:9px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit;
    transition:transform .18s ease, filter .18s ease;
  }
  .submit-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
  .submit-btn:active{transform:translateY(0);}
  .submit-btn:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed;transform:none;}
  .error-box{
    display:none;margin-top:14px;padding:10px 12px;background:#3A2320;
    border:1px solid #5A332E;border-radius:8px;color:var(--danger);font-size:13px;
  }
  .name-field{display:none;}
</style>
</head>
<body>
  <div class="card">
    <div class="mark">B-T AI</div>
    <div class="tagline">Start chatting with your own AI</div>

    <div class="tabs">
      <div class="tab active" id="loginTab">Log in</div>
      <div class="tab" id="signupTab">Sign up</div>
    </div>

    <form id="authForm">
      <div class="name-field" id="nameField">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your full name" autocomplete="name">
      </div>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="current-password" required minlength="8">
      <div class="field-hint" id="pwHint" style="display:none">Password must be at least 8 characters</div>

      <button type="submit" class="submit-btn" id="submitBtn">Log in</button>
      <div class="error-box" id="errorBox"></div>
    </form>
  </div>

<script>
  const loginTab = document.getElementById('loginTab');
  const signupTab = document.getElementById('signupTab');
  const nameField = document.getElementById('nameField');
  const nameInput = document.getElementById('name');
  const pwHint = document.getElementById('pwHint');
  const submitBtn = document.getElementById('submitBtn');
  const errorBox = document.getElementById('errorBox');
  const form = document.getElementById('authForm');

  let mode = 'login';

  function setMode(newMode){
    mode = newMode;
    loginTab.classList.toggle('active', mode === 'login');
    signupTab.classList.toggle('active', mode === 'signup');
    nameField.style.display = mode === 'signup' ? 'block' : 'none';
    nameInput.required = mode === 'signup';
    pwHint.style.display = mode === 'signup' ? 'block' : 'none';
    submitBtn.textContent = mode === 'signup' ? 'Create account' : 'Log in';
    errorBox.style.display = 'none';
  }

  loginTab.onclick = () => setMode('login');
  signupTab.onclick = () => setMode('signup');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'One moment...';

    const body = {
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    };
    if (mode === 'signup') body.name = nameInput.value.trim();

    try {
      const res = await fetch(`/api/${mode === 'signup' ? 'signup' : 'login'}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');

      localStorage.setItem('bt_user_id', data.userId);
      localStorage.setItem('bt_user_name', data.name || '');
      window.location.href = 'index.html';
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = mode === 'signup' ? 'Create account' : 'Log in';
    }
  });
</script>
</body>
</html>
